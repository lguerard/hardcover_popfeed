name: Sync Hardcover → Popfeed

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch: # manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .

      - name: Run sync
        run: hardcover-popfeed
        env:
          HARDCOVER_TOKEN: ${{ secrets.HARDCOVER_TOKEN }}
          POPFEED_IDENTIFIER: ${{ secrets.POPFEED_IDENTIFIER }}
          POPFEED_PASSWORD: ${{ secrets.POPFEED_PASSWORD }}
          POPFEED_PDS_URL: ${{ vars.POPFEED_PDS_URL }}
          POPFEED_BOOKS_LIST_URI: ${{ vars.POPFEED_BOOKS_LIST_URI }}
