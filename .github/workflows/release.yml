name: Publish Release

on:
    workflow_dispatch:
        inputs:
            tag_name:
                description: Tag to release, e.g. hardcover_popfeed-1.3.0
                required: true
                type: string
    push:
        tags:
            - "hardcover_popfeed-*"

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        env:
            RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Generate changelog
              shell: bash
              run: |
                  set -euo pipefail
                  current="$RELEASE_TAG"

                  # On a tag push the tag exists, so diff against the previous tag
                  # reachable from it. On workflow_dispatch the tag may not exist yet,
                  # so diff the latest tag against HEAD.
                  if git rev-parse --verify --quiet "${current}^{commit}" >/dev/null; then
                      upper="$current"
                      prev="$(git describe --tags --abbrev=0 "${current}^" 2>/dev/null || true)"
                  else
                      upper="HEAD"
                      prev="$(git describe --tags --abbrev=0 2>/dev/null || true)"
                  fi
                  range="$upper"
                  [ -n "$prev" ] && range="${prev}..${upper}"

                  declare -A H=(
                      [feat]="### ✨ Features"
                      [fix]="### 🐛 Bug Fixes"
                      [perf]="### ⚡ Performance"
                      [refactor]="### ♻️ Refactoring"
                      [docs]="### 📝 Documentation"
                      [build]="### 🏗️ Build"
                      [ci]="### 👷 CI"
                      [test]="### ✅ Tests"
                      [chore]="### 🔧 Chores"
                  )
                  order=(feat fix perf refactor docs build ci test chore)
                  declare -A B
                  other=""

                  while IFS= read -r s; do
                      [ -z "$s" ] && continue
                      if [[ "$s" =~ ^([a-z]+)(\([^\)]*\))?(!)?:\ *(.*)$ ]]; then
                          t="${BASH_REMATCH[1]}"; brk="${BASH_REMATCH[3]}"; d="${BASH_REMATCH[4]}"
                          d="$(sed -E 's/^[^[:alnum:]]+//' <<<"$d")"
                          [ -n "$brk" ] && d="**BREAKING** $d"
                          if [ -n "${H[$t]:-}" ]; then B[$t]+="- $d"$'\n'; else other+="- $d"$'\n'; fi
                      else
                          other+="- $s"$'\n'
                      fi
                  done < <(git log "$range" --no-merges --pretty=tformat:'%s')

                  {
                      for t in "${order[@]}"; do
                          [ -n "${B[$t]:-}" ] && printf '%s\n\n%s\n' "${H[$t]}" "${B[$t]}"
                      done
                      [ -n "$other" ] && printf '### Other\n\n%s\n' "$other"
                  } > release-notes.md

                  if [ ! -s release-notes.md ]; then
                      echo "Maintenance release." > release-notes.md
                  fi

                  echo "----- release-notes.md -----"
                  cat release-notes.md

            - name: Publish GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ env.RELEASE_TAG }}
                  target_commitish: ${{ github.sha }}
                  body_path: release-notes.md
                  generate_release_notes: true
                  prerelease: ${{ github.event_name == 'workflow_dispatch' }}
