name: Publish Release

on:
    workflow_dispatch:
        inputs:
            tag_name:
                description: Tag to release, e.g. hardcover_popfeed-1.3.0
                required: true
                type: string
    push:
        tags:
            - "hardcover_popfeed-*"

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        env:
            RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Generate changelog
              uses: orhun/git-cliff-action@v4
              id: cliff
              with:
                  config: cliff.toml
                  args: ${{ startsWith(github.ref, 'refs/tags/') && '--latest --strip header' || '--unreleased --strip header' }}

            - name: Publish GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ env.RELEASE_TAG }}
                  target_commitish: ${{ github.sha }}
                  body: ${{ steps.cliff.outputs.content }}
                  prerelease: ${{ github.event_name == 'workflow_dispatch' }}
